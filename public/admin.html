<head>
<meta charset="UTF-8">

<meta name="description" content="Database link dan akses operasional divisi Admin Rumah BUMN Jakarta.">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Division Navigation Bar -->
<nav class="div-topbar" id="divTopbar">
  <a href="index.html" class="home-link" title="Kembali ke Beranda">⌂ Home</a>
  <a href="business-development.html">Business Dev</a>

<div class="hero">
  <img src="FOTO/LOGO.png" alt="Logo Rumah BUMN Jakarta" class="hero-logo-small">
  <div class="eyebrow">Rumah BUMN Jakarta &middot; Admin</div>
  <h1>Database Admin</h1>
  <p>Dokumen administrasi, surat-menyurat, absensi, inventaris, dan data operasional divisi Admin.</p>
  <div class="stat-row">
    <div class="stat"><b id="stat-total">0</b><span>Total Item</span></div>
    <div class="stat"><b id="stat-cat">0</b><span>Kategori</span></div>
  </div>
</div>

<div class="controls">
  <div class="search-bar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="searchInput" type="text" placeholder="Cari dokumen, surat, atau kata kunci...">
  </div>
  <div class="chips" id="chipRow"></div>
</div>

<div class="wrap">
  <div class="grid" id="grid"></div>
  <div class="empty" id="emptyState" style="display:none;">Tidak ada hasil ditemukan.</div>
</div>

<footer>Rumah BUMN Jakarta — Kolaborasi BRI &amp; Danantara Indonesia</footer>

<script src="shared.js"></script>
<script>
fetch('/api/items?division=admin')
  .then(res => res.json())
  .then(items => {
    initDivisionPage(items);
  })
  .catch(err => {
    console.error('Error fetching data:', err);
    initDivisionPage([]);
  });
</script>
</body>
