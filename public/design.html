<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design — Database Rumah BUMN Jakarta</title>
<meta name="description" content="Database link dan akses operasional divisi Design Rumah BUMN Jakarta.">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-shell">
  <div id="sidebarContainer"></div>
  <main class="app-main">
    <div class="app-topbar">
      <button class="sidebar-toggle" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title">Design <small>Database link &amp; akses divisi</small></div>
    </div>
    <div id="appContent" class="app-content" style="display:none;">
      <div class="division-header">
        <div class="division-header-icon" style="background:rgba(236,72,153,0.1); color:var(--accent-design);"><i data-lucide="palette"></i></div>
        <div class="division-header-text">
          <h1>Design</h1>
          <p>Semua aset, referensi, tools, dan akses operasional divisi Design.</p>
        </div>
        <div class="division-stats">
          <div class="division-stat"><b id="stat-total">0</b><span>Total Item</span></div>
          <div class="division-stat"><b id="stat-cat">0</b><span>Kategori</span></div>
        </div>
      </div>
      <div class="controls">
        <div class="search-bar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="searchInput" type="text" placeholder="Cari dokumen, form, atau kata kunci...">
        </div>
        <div class="chips" id="chipRow"></div>
      </div>
      <div class="wrap">
        <div class="grid" id="grid"></div>
        <div class="empty" id="emptyState" style="display:none;">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <p>Tidak ada hasil ditemukan.</p>
        </div>
      </div>
      <footer style="margin-top:40px;">Rumah BUMN Jakarta — Kolaborasi BRI &amp; Danantara Indonesia</footer>
    </div>
  </main>
</div>

<script src="shared.js"></script>
<script>
initAppShell('design', function(user) {
  fetch('/api/items?division=design')
    .then(r => r.json())
    .then(items => initDivisionPage(items))
    .catch(() => initDivisionPage([]));
});
</script>
</body>
</html>
