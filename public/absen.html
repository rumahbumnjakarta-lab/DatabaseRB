<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d1421">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Absensi — Rumah BUMN Jakarta</title>
<meta name="description" content="Sistem absensi digital Rumah BUMN Jakarta dengan GPS dan foto selfie.">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="style.css">
<link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ─── Absen Page Specific ─── */
.absen-container {
  max-width: 480px;
  margin: 0 auto;
  padding: 16px;
  padding-bottom: 90px; /* room for bottom nav */
}

/* Date & Greeting */
.absen-greeting {
  background: linear-gradient(135deg, rgba(8,87,195,0.2), rgba(48,127,226,0.08));
  border: 1px solid rgba(48,127,226,0.2);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.absen-greeting::before {
  content: '';
  position: absolute;
  top: -20px; right: -20px;
  width: 80px; height: 80px;
  background: radial-gradient(circle, rgba(113,197,232,0.15), transparent);
  border-radius: 50%;
}
.absen-greeting-date {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.absen-greeting-name {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
}
.absen-greeting-sub {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 4px;
}
.absen-time {
  font-size: 28px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  color: var(--blue-mid);
  margin-top: 10px;
}

/* Status today */
.absen-status-row {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}
.absen-status-card {
  flex: 1;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  text-align: center;
}
.absen-status-card.filled {
  border-color: rgba(34,197,94,0.3);
  background: rgba(34,197,94,0.05);
}
.absen-status-card.missed {
  border-color: rgba(239,68,68,0.2);
}
.absen-status-icon { font-size: 22px; margin-bottom: 4px; }
.absen-status-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.absen-status-time { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }

/* GPS Card */
.gps-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 16px;
}
.gps-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.gps-icon {
  width: 34px; height: 34px;
  background: rgba(48,127,226,0.12);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.gps-info { flex: 1; min-width: 0; }
.gps-status { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.gps-coords { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
.gps-address { font-size: 12px; color: var(--text-secondary); margin-top: 2px; line-height: 1.4; }

#map {
  height: 180px;
  width: 100%;
  background: var(--bg-card);
}

/* Camera / Selfie */
.camera-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 16px;
}
.camera-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
}
.camera-preview-area {
  position: relative;
  background: #0a0f1a;
  height: 220px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
#cameraVideo {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}
#cameraCanvas { display: none; }
#selfiePreview {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}
.camera-placeholder {
  text-align: center;
  color: var(--text-muted);
}
.camera-placeholder svg { margin-bottom: 8px; opacity: 0.4; }
.camera-placeholder p { font-size: 13px; }

.camera-actions {
  padding: 12px 16px;
  display: flex;
  gap: 10px;
}
.btn-camera {
  flex: 1;
  padding: 10px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-primary);
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-family: 'Inter', sans-serif;
  transition: all 0.15s;
}
.btn-camera:hover { background: var(--bg-card-hover); }
.btn-camera.primary {
  background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid));
  border-color: transparent;
  color: #fff;
  box-shadow: 0 3px 10px rgba(8,87,195,0.3);
}

/* Clock In/Out buttons */
.absen-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.btn-absen {
  padding: 16px;
  border: none;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: 'Inter', sans-serif;
  transition: all 0.2s;
  flex-direction: column;
  gap: 4px;
  line-height: 1.3;
}
.btn-clock-in {
  background: linear-gradient(135deg, #059669, #10b981);
  color: #fff;
  box-shadow: 0 4px 16px rgba(5,150,105,0.35);
}
.btn-clock-in:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(5,150,105,0.45); }
.btn-clock-out {
  background: linear-gradient(135deg, #dc2626, #ef4444);
  color: #fff;
  box-shadow: 0 4px 16px rgba(220,38,38,0.3);
}
.btn-clock-out:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(220,38,38,0.4); }
.btn-absen:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
.btn-absen-icon { font-size: 22px; }
.btn-absen-text { font-size: 14px; }
.btn-absen-sub { font-size: 11px; opacity: 0.8; font-weight: 500; }

/* Today's record */
.today-log {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.today-log-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.live-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  font-weight: 700;
  color: #4ade80;
  background: rgba(34,197,94,0.1);
  border: 1px solid rgba(34,197,94,0.2);
  padding: 2px 8px;
  border-radius: 20px;
}
.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #4ade80;
  animation: livePulse 1.5s ease-in-out infinite;
}
@keyframes livePulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

.log-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  animation: fadeInRow 0.3s ease both;
}
.log-item:last-child { border-bottom: none; }
@keyframes fadeInRow { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

.log-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid));
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff;
  flex-shrink: 0; overflow: hidden;
}
.log-avatar img { width: 100%; height: 100%; object-fit: cover; }
.log-info { flex: 1; min-width: 0; }
.log-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.log-type-time { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
.log-type-badge {
  font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 20px;
  flex-shrink: 0;
}
.log-type-badge.clock_in { background: rgba(34,197,94,0.12); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
.log-type-badge.clock_out { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }

.log-photo-thumb {
  width: 36px; height: 36px;
  border-radius: 8px;
  object-fit: cover;
  border: 1px solid var(--border);
  cursor: pointer;
  flex-shrink: 0;
}
.log-map-btn {
  width: 34px; height: 34px;
  background: rgba(48,127,226,0.1);
  border: 1px solid rgba(48,127,226,0.2);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 14px;
  flex-shrink: 0;
  transition: background 0.15s;
}
.log-map-btn:hover { background: rgba(48,127,226,0.2); }
.log-empty { padding: 30px 16px; text-align: center; color: var(--text-muted); font-size: 13px; }

/* Photo lightbox */
.lightbox {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(6px);
}
.lightbox img { max-width: 90vw; max-height: 85vh; border-radius: 12px; }
.lightbox-close {
  position: fixed; top: 16px; right: 16px;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  color: #fff; border-radius: 50%; width: 40px; height: 40px;
  cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center;
}

/* Submit overlay */
.submit-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 500;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.submit-box {
  background: var(--bg-card);
  border: 1px solid var(--border-mid);
  border-radius: 20px;
  padding: 32px;
  text-align: center;
  width: 280px;
}
.submit-spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(48,127,226,0.2);
  border-top-color: var(--blue-mid);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
.submit-success { font-size: 40px; margin-bottom: 12px; }
.submit-msg { font-size: 14px; color: var(--text-secondary); }
</style>
</head>
<body>

<div class="app-shell">
  <div id="sidebarContainer"></div>
  <main class="app-main">
    <!-- Topbar -->
    <div class="app-topbar">
      <button class="sidebar-toggle" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title">
        Absensi
        <small>Check-in &amp; Check-out harian</small>
      </div>
      <div class="topbar-actions">
        <span class="live-badge"><span class="live-dot"></span>LIVE</span>
      </div>
    </div>

    <!-- Page Content -->
    <div id="appContent" style="display:none;">
      <div class="absen-container">

        <!-- Greeting & Clock -->
        <div class="absen-greeting">
          <div class="absen-greeting-date" id="greetDate">Memuat tanggal...</div>
          <div class="absen-greeting-name" id="greetName">Halo! 👋</div>
          <div class="absen-greeting-sub" id="greetSub">Selamat bekerja hari ini</div>
          <div class="absen-time" id="liveClock">--:--:--</div>
        </div>

        <!-- Today Status -->
        <div class="absen-status-row">
          <div class="absen-status-card" id="statusClockIn" style="width: 100%; flex: none;">
            <div class="absen-status-icon">📍</div>
            <div class="absen-status-label">Status Absensi Hari Ini</div>
            <div class="absen-status-time" id="timeClockIn">Belum Absen</div>
          </div>
        </div>

        <!-- GPS & Map -->
        <div class="gps-card">
          <div class="gps-header">
            <div class="gps-icon">📍</div>
            <div class="gps-info">
              <div class="gps-status" id="gpsStatus">Meminta akses lokasi...</div>
              <div class="gps-coords" id="gpsCoords">—</div>
              <div class="gps-address" id="gpsAddress">Mohon izinkan akses lokasi</div>
            </div>
          </div>
          <div id="map"></div>
        </div>

        <!-- Camera / Selfie -->
        <div class="camera-card">
          <div class="camera-header">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            Foto Selfie
          </div>
          <div class="camera-preview-area">
            <div class="camera-placeholder" id="cameraPlaceholder">
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              <p>Belum ada foto</p>
            </div>
            <video id="cameraVideo" autoplay playsinline muted></video>
            <canvas id="cameraCanvas"></canvas>
            <img id="selfiePreview" alt="Selfie preview">
          </div>
          <div class="camera-actions">
            <button class="btn-camera" onclick="startCamera()" id="btnStartCam">📷 Buka Kamera</button>
            <button class="btn-camera primary" onclick="takeSelfie()" id="btnSnap" style="display:none;">📸 Ambil Foto</button>
            <button class="btn-camera" onclick="retakeSelfie()" id="btnRetake" style="display:none;">🔄 Ulangi</button>
            <label class="btn-camera" style="cursor:pointer;" id="btnUpload">
              🖼️ Upload
              <input type="file" accept="image/*" capture="user" style="display:none;" onchange="handleUpload(this)">
            </label>
          </div>
        </div>

        <!-- Absen Buttons -->
        <div class="absen-actions" style="display: block;">
          <button class="btn-absen btn-clock-in" id="btnClockIn" onclick="submitAbsen('clock_in')" style="width: 100%;">
            <span class="btn-absen-icon">✅</span>
            <span class="btn-absen-text">Absen Sekarang</span>
            <span class="btn-absen-sub">Kirim Foto &amp; Lokasi GPS</span>
          </button>
        </div>

        <!-- Today's Log (Realtime) -->
        <div class="today-log">
          <div class="today-log-header">
            <span>Riwayat Absen Hari Ini</span>
            <span class="live-badge"><span class="live-dot"></span>LIVE</span>
          </div>
          <div id="logList"><div class="log-empty">Memuat data absensi...</div></div>
        </div>

      </div><!-- .absen-container -->
    </div><!-- #appContent -->
  </main>
</div>

<script src="shared.js"></script>
<script>
let currentUser = null;
let gpsData = { lat: null, lng: null, address: '—', accuracy: null };
let selfieBase64 = null;
let map = null;
let myMarker = null;
let cameraStream = null;

// ─── Init ───
initAppShell('absen', function(user) {
  currentUser = user;

  // Greeting
  const now = new Date();
  const dayNames = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const monthNames = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  document.getElementById('greetDate').textContent =
    `${dayNames[now.getDay()]}, ${now.getDate()} ${monthNames[now.getMonth()]} ${now.getFullYear()}`;

  const firstName = user.name ? user.name.split(' ')[0] : 'Pengguna';
  const hour = now.getHours();
  const greeting = hour < 11 ? 'Selamat pagi' : hour < 15 ? 'Selamat siang' : hour < 18 ? 'Selamat sore' : 'Selamat malam';
  document.getElementById('greetName').textContent = `${greeting}, ${firstName}! ${hour < 11 ? '☀️' : hour < 18 ? '🌤️' : '🌙'}`;
  document.getElementById('greetSub').textContent = user.role === 'staff' ? 'Selamat bekerja, Staff Rumah BUMN!' : 'Semangat magang hari ini!';

  // Live clock
  updateClock();
  setInterval(updateClock, 1000);

  // Init map
  initMap();

  // Get GPS
  getLocation();

  // Load today's log
  loadTodayLog();
  setInterval(loadTodayLog, 30000); // Realtime poll every 30s
});

function updateClock() {
  const now = new Date();
  document.getElementById('liveClock').textContent =
    now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

// ─── Map Init ───
function initMap() {
  map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-6.2088, 106.8456], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);
  L.control.attribution({ prefix: false }).addTo(map);
  setTimeout(() => map.invalidateSize(), 200);
}

// ─── GPS ───
function getLocation() {
  const statusEl = document.getElementById('gpsStatus');
  const coordsEl = document.getElementById('gpsCoords');
  const addressEl = document.getElementById('gpsAddress');

  if (!navigator.geolocation) {
    statusEl.textContent = '❌ GPS tidak didukung browser ini';
    return;
  }

  statusEl.textContent = '📡 Mendapatkan lokasi...';

  navigator.geolocation.watchPosition(
    (pos) => {
      gpsData.lat = pos.coords.latitude;
      gpsData.lng = pos.coords.longitude;
      gpsData.accuracy = Math.round(pos.coords.accuracy);

      statusEl.textContent = `✅ Lokasi terdeteksi (akurasi ±${gpsData.accuracy}m)`;
      coordsEl.textContent = `${gpsData.lat.toFixed(6)}, ${gpsData.lng.toFixed(6)}`;

      // Update map
      if (map) {
        map.setView([gpsData.lat, gpsData.lng], 16);
        if (myMarker) {
          myMarker.setLatLng([gpsData.lat, gpsData.lng]);
        } else {
          const icon = L.divIcon({
            html: `<div style="background:#307fe2;width:14px;height:14px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.4);"></div>`,
            iconSize: [14, 14],
            iconAnchor: [7, 7],
            className: ''
          });
          myMarker = L.marker([gpsData.lat, gpsData.lng], { icon }).addTo(map);
          L.circle([gpsData.lat, gpsData.lng], {
            radius: gpsData.accuracy,
            color: '#307fe2', fillColor: '#307fe2', fillOpacity: 0.08, weight: 1
          }).addTo(map);
        }
      }

      // Reverse geocode via Nominatim (OpenStreetMap)
      if (!gpsData.address || gpsData.address === '—') {
        fetch(`https://nominatim.openstreetmap.org/reverse?lat=${gpsData.lat}&lon=${gpsData.lng}&format=json`)
          .then(r => r.json())
          .then(data => {
            const addr = data.address;
            const parts = [addr.road, addr.suburb, addr.city || addr.county].filter(Boolean);
            gpsData.address = parts.join(', ') || data.display_name.split(',').slice(0,3).join(',');
            addressEl.textContent = gpsData.address;
          })
          .catch(() => { gpsData.address = `${gpsData.lat.toFixed(4)}, ${gpsData.lng.toFixed(4)}`; });
      } else {
        addressEl.textContent = gpsData.address;
      }
    },
    (err) => {
      statusEl.textContent = '⚠️ Akses lokasi ditolak — GPS diperlukan untuk absen';
      coordsEl.textContent = 'Izinkan akses lokasi di browser';
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 }
  );
}

// ─── Camera ───
function startCamera() {
  const video = document.getElementById('cameraVideo');
  const placeholder = document.getElementById('cameraPlaceholder');
  const btnStart = document.getElementById('btnStartCam');
  const btnSnap = document.getElementById('btnSnap');
  const btnUpload = document.getElementById('btnUpload');

  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
    .then(stream => {
      cameraStream = stream;
      video.srcObject = stream;
      video.style.display = 'block';
      placeholder.style.display = 'none';
      btnStart.style.display = 'none';
      btnSnap.style.display = 'flex';
      btnUpload.style.display = 'none';
    })
    .catch(() => {
      alert('Tidak dapat membuka kamera. Coba gunakan tombol Upload sebagai alternatif.');
    });
}

function takeSelfie() {
  const video = document.getElementById('cameraVideo');
  const canvas = document.getElementById('cameraCanvas');
  const preview = document.getElementById('selfiePreview');
  const btnSnap = document.getElementById('btnSnap');
  const btnRetake = document.getElementById('btnRetake');

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);

  selfieBase64 = canvas.toDataURL('image/jpeg', 0.8);
  preview.src = selfieBase64;
  preview.style.display = 'block';
  video.style.display = 'none';

  // Stop camera stream
  if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());

  btnSnap.style.display = 'none';
  btnRetake.style.display = 'flex';
}

function retakeSelfie() {
  const preview = document.getElementById('selfiePreview');
  const placeholder = document.getElementById('cameraPlaceholder');
  const btnStart = document.getElementById('btnStartCam');
  const btnRetake = document.getElementById('btnRetake');
  const btnUpload = document.getElementById('btnUpload');

  selfieBase64 = null;
  preview.style.display = 'none';
  preview.src = '';
  placeholder.style.display = 'flex';
  btnStart.style.display = 'flex';
  btnRetake.style.display = 'none';
  btnUpload.style.display = 'flex';
}

function handleUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    selfieBase64 = e.target.result;
    const preview = document.getElementById('selfiePreview');
    const placeholder = document.getElementById('cameraPlaceholder');
    const btnRetake = document.getElementById('btnRetake');
    const btnStart = document.getElementById('btnStartCam');
    const btnUpload = document.getElementById('btnUpload');

    preview.src = selfieBase64;
    preview.style.display = 'block';
    placeholder.style.display = 'none';
    btnStart.style.display = 'none';
    btnRetake.style.display = 'flex';
    btnUpload.style.display = 'none';
  };
  reader.readAsDataURL(file);
}

// ─── Submit Absen ───
async function submitAbsen(type) {
  if (!gpsData.lat || !gpsData.lng) {
    showToastMsg('⚠️ GPS belum terdeteksi. Tunggu sebentar lagi.', true);
    return;
  }

  // Show loading overlay
  const overlay = document.createElement('div');
  overlay.className = 'submit-overlay';
  overlay.innerHTML = `
    <div class="submit-box">
      <div class="submit-spinner"></div>
      <div class="submit-msg">Mengirim data absensi...</div>
    </div>`;
  document.body.appendChild(overlay);

  try {
    const res = await fetch('/api/absen', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type,
        photo_base64: selfieBase64,
        latitude: gpsData.lat,
        longitude: gpsData.lng,
        address: gpsData.address
      })
    });
    const data = await res.json();

    overlay.querySelector('.submit-box').innerHTML = `
      <div class="submit-success">${res.ok ? '✅' : '❌'}</div>
      <div style="font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:var(--text-primary);margin-bottom:8px;">
        ${res.ok ? 'Berhasil!' : 'Gagal!'}
      </div>
      <div class="submit-msg">${data.message || data.error}</div>`;

    setTimeout(() => {
      overlay.remove();
      loadTodayLog();
    }, 2000);
  } catch (err) {
    overlay.remove();
    showToastMsg('❌ Koneksi gagal. Coba lagi.', true);
  }
}

// ─── Load Today's Log ───
async function loadTodayLog() {
  try {
    const res = await fetch('/api/absen/today');
    const records = await res.json();
    renderLog(records);
    updateStatusCards(records);
  } catch (e) {
    document.getElementById('logList').innerHTML = '<div class="log-empty">Gagal memuat data.</div>';
  }
}

function updateStatusCards(records) {
  const myRecords = records.filter(r => r.user_email === currentUser.email);
  const clockIn = myRecords.find(r => r.type === 'clock_in');

  const ciEl = document.getElementById('statusClockIn');

  if (clockIn) {
    const time = new Date(clockIn.timestamp).toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'});
    document.getElementById('timeClockIn').textContent = `Sudah Absen (${time})`;
    ciEl.classList.add('filled');
  } else {
    document.getElementById('timeClockIn').textContent = 'Belum Absen';
    ciEl.classList.remove('filled');
  }
}


function renderLog(records) {
  const list = document.getElementById('logList');
  if (!records.length) {
    list.innerHTML = '<div class="log-empty">Belum ada absensi hari ini</div>';
    return;
  }

  list.innerHTML = records.map(r => {
    const initial = (r.user_name || r.user_email || '?').charAt(0).toUpperCase();
    const time = new Date(r.timestamp).toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'});
    const label = r.type === 'clock_in' ? 'Clock In' : 'Clock Out';
    const mapsUrl = `https://www.google.com/maps?q=${r.latitude},${r.longitude}`;

    return `<div class="log-item">
      <div class="log-avatar">
        ${r.photo_url && r.photo_url.startsWith('http') ? `<img src="${r.photo_url}" alt="" onerror="this.style.display='none'">` : initial}
      </div>
      <div class="log-info">
        <div class="log-name">${escHtml(r.user_name || r.user_email)}</div>
        <div class="log-type-time">${time} · ${r.address ? escHtml(r.address.substring(0,40)) : 'Lokasi tercatat'}</div>
      </div>
      <span class="log-type-badge ${r.type}">${label}</span>
      ${r.photo_url && r.photo_url.startsWith('http') ? `<img class="log-photo-thumb" src="${r.photo_url}" onclick="showLightbox('${r.photo_url}')" alt="Selfie">` : ''}
      <a class="log-map-btn" href="${mapsUrl}" target="_blank" title="Lihat di Maps">🗺️</a>
    </div>`;
  }).join('');
}

function showLightbox(src) {
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.innerHTML = `<button class="lightbox-close" onclick="this.parentElement.remove()">✕</button><img src="${src}">`;
  lb.addEventListener('click', e => { if (e.target === lb) lb.remove(); });
  document.body.appendChild(lb);
}

function showToastMsg(msg, isError) {
  const t = document.createElement('div');
  t.className = `toast ${isError ? 'error' : 'success'}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.animation = 'toastOut 0.3s ease both'; setTimeout(() => t.remove(), 300); }, 3000);
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
