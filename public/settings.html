<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#f3f6fa">
<title>Setelan Profil — Database Rumah BUMN Jakarta</title>
<meta name="description" content="Setelan profil pengguna database Rumah BUMN Jakarta.">
<link rel="stylesheet" href="style.css">
<style>
.settings-container {
  max-width: 480px;
  margin: 0 auto;
  padding: 0 0 80px;
}
.profile-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(15, 23, 42, 0.03);
  margin-bottom: 20px;
}
.profile-avatar-wrap {
  position: relative;
  width: 100px;
  height: 100px;
  margin: 0 auto 16px;
}
.profile-avatar-large {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  font-weight: 700;
  color: #fff;
  overflow: hidden;
  border: 4px solid var(--bg-card);
  box-shadow: 0 8px 24px rgba(48, 127, 226, 0.2);
}
.profile-avatar-large img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.avatar-edit-badge {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 32px;
  height: 32px;
  background: var(--blue-mid);
  border: 3px solid var(--bg-card);
  color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
  transition: transform 0.2s;
}
.avatar-edit-badge:hover {
  transform: scale(1.1);
}
.profile-email-label {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 4px;
}
.btn-save-profile {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid));
  border: none;
  color: #fff;
  font-weight: 700;
  font-size: 14px;
  font-family: inherit;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(8, 87, 195, 0.25);
  transition: all 0.2s;
}
.btn-save-profile:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(8, 87, 195, 0.35);
}
.btn-save-profile:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}
</style>
</head>
<body>

<div class="app-shell">
  <div id="sidebarContainer"></div>
  <main class="app-main">
    <div class="app-topbar">
      <button class="sidebar-toggle" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title">Setelan Profil <small>Ubah identitas &amp; foto profil Anda</small></div>
    </div>
    <div id="appContent" class="app-content" style="display:none;">
      <div class="settings-container">

        <div class="profile-card">
          <div class="profile-avatar-wrap">
            <div class="profile-avatar-large" id="avatarLarge">?</div>
            <label class="avatar-edit-badge" for="avatarInput" title="Ubah Foto">
              📷
              <input type="file" id="avatarInput" accept="image/*" style="display:none;" onchange="previewAvatar(this)">
            </label>
          </div>
          <h2 id="profileNameHeader" style="font-family:'Inter',sans-serif; font-size: 20px; font-weight:700;">Loading...</h2>
          <div class="profile-email-label" id="profileEmail">...</div>
        </div>

        <div class="card">
          <div class="form-title">Edit Detail Profil</div>
          
          <div class="form-group">
            <label class="form-label" for="editName">Nama Lengkap</label>
            <input type="text" class="form-control" id="editName" placeholder="Masukkan nama lengkap...">
          </div>

          <button class="btn-save-profile" id="btnSave" onclick="saveProfile()">Simpan Perubahan</button>
        </div>

      </div>
    </div>
  </main>
</div>

<script src="shared.js"></script>
<script>
let currentUser = null;
let avatarBase64 = null;

initAppShell('settings', function(user) {
  currentUser = user;
  
  // Fill profile details
  document.getElementById('profileNameHeader').textContent = user.name || user.email;
  document.getElementById('profileEmail').textContent = user.email;
  document.getElementById('editName').value = user.name || '';
  
  updateAvatarView(user.avatar, user.name || user.email);
});

function updateAvatarView(url, name) {
  const container = document.getElementById('avatarLarge');
  const initial = name.charAt(0).toUpperCase();
  
  if (url && url.startsWith('http')) {
    container.innerHTML = `<img src="${url}" alt="" onerror="this.innerHTML='${initial}'">`;
  } else {
    container.textContent = initial;
  }
}

function previewAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    avatarBase64 = e.target.result;
    
    // Preview in large avatar immediately
    const container = document.getElementById('avatarLarge');
    container.innerHTML = `<img src="${avatarBase64}" alt="Preview">`;
  };
  reader.readAsDataURL(file);
}

async function saveProfile() {
  const name = document.getElementById('editName').value.trim();
  const btn = document.getElementById('btnSave');
  
  if (!name) {
    showToastMsg('Nama tidak boleh kosong.', true);
    return;
  }
  
  btn.disabled = true;
  btn.textContent = 'Menyimpan...';
  
  try {
    const res = await fetch('/api/user/profile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name,
        avatar_base64: avatarBase64
      })
    });
    
    const data = await res.json();
    
    if (res.ok) {
      showToastMsg('Profil berhasil disimpan!', false);
      // Reload page to refresh sidebar user bar
      setTimeout(() => {
        location.reload();
      }, 1000);
    } else {
      showToastMsg(data.error || 'Gagal menyimpan profil.', true);
      btn.disabled = false;
      btn.textContent = 'Simpan Perubahan';
    }
  } catch (err) {
    showToastMsg('Terjadi kesalahan koneksi server.', true);
    btn.disabled = false;
    btn.textContent = 'Simpan Perubahan';
  }
}

function showToastMsg(msg, isError) {
  // Use simple toast if shared.js doesn't have it global
  const t = document.createElement('div');
  t.className = `toast ${isError ? 'error' : 'success'}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => {
    t.style.animation = 'toastOut 0.3s ease both';
    setTimeout(() => t.remove(), 300);
  }, 3000);
}
</script>
</body>
</html>
